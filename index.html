<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gmail Sorter</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f8fafc; font-family: sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const CATEGORIES = {
      important: { label: "🔴 Important", color: "#ef4444", bg: "#fef2f2", border: "#fecaca" },
      not_important: { label: "⚪ Not Important", color: "#6b7280", bg: "#f9fafb", border: "#e5e7eb" },
    };

    const CATEGORIZE_PROMPT = `You are an email classifier. Classify each email into exactly one of these two categories:
- important: Work emails, critical alerts, high-priority messages that need attention
- not_important: Marketing, promotions, newsletters, FYI emails that need no action

Also determine:
- replied: true if the email has been replied to (hasReply field is true), false otherwise

Return ONLY a JSON array. Each item must have: threadId, category, replied, reason, subject, sender, snippet. No markdown, no preamble.`;

    async function fetchThreads(query, apiKey) {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 4000,
          system: `You have access to Gmail via MCP. Call search_threads with EXACTLY this query: ${JSON.stringify(query)} and pageSize 20. Return ONLY the raw JSON tool result, no commentary.`,
          messages: [{ role: "user", content: "Fetch emails now." }],
          mcp_servers: [{ type: "url", url: "https://gmailmcp.googleapis.com/mcp/v1", name: "gmail" }],
        }),
      });
      const d = await res.json();
      let threads = [];
      for (const b of (d.content || [])) {
        if (b.type === "mcp_tool_result") {
          try {
            const p = JSON.parse(b.content?.[0]?.text || "{}");
            if (p.threads?.length) { threads = p.threads; break; }
            if (Array.isArray(p) && p.length) { threads = p; break; }
          } catch(e) {}
        }
      }
      if (!threads.length) {
        for (const b of (d.content || [])) {
          if (b.type === "text") {
            try {
              const p = JSON.parse(b.text.replace(/```json|```/g, "").trim());
              if (p.threads?.length) { threads = p.threads; break; }
            } catch(e) {}
          }
        }
      }
      return threads;
    }

    async function categorizeThreads(threads, apiKey) {
      const msgs = threads.slice(0, 20).map(t => {
        const msgs2 = t.messages || [];
        const msg = msgs2.slice().reverse().find(m => m.labelIds?.includes("INBOX")) || msgs2[msgs2.length - 1] || {};
        const hasReply = msgs2.some(m => m.labelIds?.includes("SENT"));
        return { threadId: t.id, subject: msg.subject || "(no subject)", sender: msg.from || msg.sender || "Unknown", snippet: (msg.snippet || "").slice(0, 120), hasReply };
      });
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 2000,
          system: CATEGORIZE_PROMPT,
          messages: [{ role: "user", content: JSON.stringify(msgs) }],
        }),
      });
      const data = await res.json();
      const txt = (data.content?.find(b => b.type === "text")?.text || "[]").replace(/```json|```/g, "").trim();
      return JSON.parse(txt);
    }

    function App() {
      const [apiKey, setApiKey] = useState("");
      const [apiKeySaved, setApiKeySaved] = useState(false);
      const [emails, setEmails] = useState([]);
      const [loading, setLoading] = useState(false);
      const [loadingMsg, setLoadingMsg] = useState("");
      const [error, setError] = useState(null);
      const [catFilter, setCatFilter] = useState("all");
      const [activeSource, setActiveSource] = useState("");

      function saveApiKey() {
        if (apiKey.trim()) setApiKeySaved(true);
      }

      function showAll(threads) {
        setEmails(threads.map(t => {
          const msgs = t.messages || [];
          const msg = msgs.slice().reverse().find(m => m.labelIds?.includes("INBOX")) || msgs[msgs.length-1] || {};
          return { threadId: t.id, subject: msg.subject || "(no subject)", sender: msg.from || msg.sender || "Unknown", snippet: (msg.snippet || "").slice(0, 120), category: null };
        }));
        setActiveSource("All Inbox");
        setCatFilter("all");
        setError(null);
      }

      async function load(query, name, categorize) {
        setLoading(true);
        setError(null);
        setEmails([]);
        setCatFilter("all");
        setActiveSource(name);
        try {
          setLoadingMsg("📬 Fetching emails...");
          const threads = await fetchThreads(query, apiKey);
          if (!threads.length) { setError("no_emails"); return; }
          if (!categorize) { showAll(threads); return; }
          setLoadingMsg("🤖 Categorizing " + threads.length + " emails...");
          const categorized = await categorizeThreads(threads, apiKey);
          const sorted = categorized.slice().sort((a, b) => (a.replied === b.replied ? 0 : a.replied ? 1 : -1));
          setEmails(sorted);
        } catch(e) {
          setError(e.message || "Something went wrong.");
        } finally {
          setLoading(false);
          setLoadingMsg("");
        }
      }

      const counts = Object.keys(CATEGORIES).reduce((a, k) => { a[k] = emails.filter(e => e.category === k).length; return a; }, {});
      const filtered = catFilter === "all" ? emails : emails.filter(e => e.category === catFilter);

      if (!apiKeySaved) {
        return (
          <div style={{ maxWidth: 460, margin: "80px auto", padding: 32, background: "#fff", borderRadius: 16, boxShadow: "0 4px 24px rgba(0,0,0,0.08)" }}>
            <h1 style={{ fontSize: 24, fontWeight: 700, color: "#1e293b", marginBottom: 8, textAlign: "center" }}>📧 Gmail Sorter</h1>
            <p style={{ color: "#64748b", fontSize: 13, marginBottom: 24, textAlign: "center" }}>Enter your Anthropic API key to get started</p>
            <input
              type="password"
              placeholder="sk-ant-..."
              value={apiKey}
              onChange={e => setApiKey(e.target.value)}
              onKeyDown={e => e.key === "Enter" && saveApiKey()}
              style={{ width: "100%", padding: "10px 14px", borderRadius: 8, border: "1px solid #e2e8f0", fontSize: 14, marginBottom: 12, outline: "none" }}
            />
            <button onClick={saveApiKey}
              style={{ width: "100%", padding: "10px", background: "#6366f1", color: "#fff", border: "none", borderRadius: 8, fontWeight: 600, fontSize: 14, cursor: "pointer" }}>
              Get Started →
            </button>
            <p style={{ color: "#94a3b8", fontSize: 11, marginTop: 12, textAlign: "center" }}>Your API key is never stored or sent anywhere except Anthropic.</p>
          </div>
        );
      }

      return (
        <div style={{ maxWidth: 780, margin: "0 auto", padding: "20px 16px", minHeight: "100vh" }}>
          <h1 style={{ textAlign: "center", fontSize: 24, fontWeight: 700, color: "#1e293b", marginBottom: 4 }}>📧 Gmail Sorter</h1>
          <p style={{ textAlign: "center", color: "#64748b", fontSize: 13, marginBottom: 20 }}>AI-powered email categorization</p>

          <div style={{ display: "flex", gap: 8, justifyContent: "center", marginBottom: 20 }}>
            <button onClick={() => load("in:inbox newer_than:7d", "Last 7 Days", true)} disabled={loading}
              style={{ padding: "10px 24px", background: "#6366f1", color: "#fff", border: "none", borderRadius: 8, fontWeight: 600, fontSize: 14, cursor: loading ? "not-allowed" : "pointer", opacity: loading ? 0.6 : 1 }}>
              🚀 Last 7 Days
            </button>
            <button onClick={() => load("in:inbox", "All Inbox", false)} disabled={loading}
              style={{ padding: "10px 24px", background: "#0ea5e9", color: "#fff", border: "none", borderRadius: 8, fontWeight: 600, fontSize: 14, cursor: loading ? "not-allowed" : "pointer", opacity: loading ? 0.6 : 1 }}>
              📬 All Inbox
            </button>
          </div>

          {activeSource && !loading && emails.length > 0 && (
            <div style={{ textAlign: "center", marginBottom: 12 }}>
              <span style={{ background: "#e0e7ff", color: "#4338ca", borderRadius: 20, padding: "3px 14px", fontSize: 13, fontWeight: 600 }}>📂 {activeSource}</span>
            </div>
          )}

          {loading && (
            <div style={{ textAlign: "center", padding: 40, color: "#6366f1", fontSize: 15 }}>
              <div style={{ fontSize: 36, marginBottom: 8 }}>⏳</div>
              {loadingMsg}
            </div>
          )}

          {error === "no_emails" && !loading && (
            <div style={{ textAlign: "center", padding: 32, background: "#fff", borderRadius: 10, border: "1px solid #e2e8f0" }}>
              <div style={{ fontSize: 40 }}>📭</div>
              <p style={{ fontWeight: 600, color: "#1e293b", marginTop: 8 }}>No emails found</p>
              <p style={{ color: "#64748b", fontSize: 13 }}>Try All Inbox instead.</p>
            </div>
          )}

          {error && error !== "no_emails" && !loading && (
            <div style={{ background: "#fef2f2", border: "1px solid #fecaca", borderRadius: 8, padding: 12, color: "#dc2626", fontSize: 14, marginBottom: 16 }}>⚠️ {error}</div>
          )}

          {!loading && emails.length > 0 && (
            <>
              {activeSource !== "All Inbox" && (
                <>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: 10, marginBottom: 16 }}>
                    {Object.entries(CATEGORIES).map(([k, c]) => (
                      <div key={k} onClick={() => setCatFilter(catFilter === k ? "all" : k)}
                        style={{ background: catFilter === k ? c.bg : "#fff", border: "2px solid " + (catFilter === k ? c.border : "#e2e8f0"), borderRadius: 10, padding: "10px 8px", textAlign: "center", cursor: "pointer" }}>
                        <div style={{ fontSize: 20, fontWeight: 700, color: c.color }}>{counts[k]}</div>
                        <div style={{ fontSize: 11, color: "#64748b", marginTop: 2 }}>{c.label}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14 }}>
                    <button onClick={() => setCatFilter("all")}
                      style={{ padding: "4px 12px", borderRadius: 20, border: "1px solid #e2e8f0", background: catFilter === "all" ? "#6366f1" : "#fff", color: catFilter === "all" ? "#fff" : "#374151", fontSize: 12, cursor: "pointer" }}>
                      All ({emails.length})
                    </button>
                    {Object.entries(CATEGORIES).map(([k, c]) => (
                      <button key={k} onClick={() => setCatFilter(k)}
                        style={{ padding: "4px 12px", borderRadius: 20, border: "1px solid " + c.border, background: catFilter === k ? c.bg : "#fff", color: c.color, fontSize: 12, cursor: "pointer" }}>
                        {c.label} ({counts[k]})
                      </button>
                    ))}
                  </div>
                </>
              )}

              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {filtered.map(em => {
                  const c = em.category ? (CATEGORIES[em.category] || CATEGORIES.not_important) : { color: "#6366f1", bg: "#eef2ff", border: "#c7d2fe" };
                  return (
                    <div key={em.threadId} onClick={() => window.open("https://mail.google.com/mail/u/0/#inbox/" + em.threadId, "_blank")}
                      style={{ background: "#fff", border: "1px solid " + c.border, borderLeft: "4px solid " + c.color, borderRadius: 10, padding: "12px 14px", cursor: "pointer" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", gap: 10, alignItems: "flex-start" }}>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontWeight: 600, color: "#1e293b", fontSize: 14, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{em.subject}</div>
                          <div style={{ color: "#64748b", fontSize: 12, marginTop: 2 }}>From: {em.sender}</div>
                          <div style={{ color: "#94a3b8", fontSize: 12, marginTop: 3 }}>{em.snippet}</div>
                          {em.replied !== undefined && (
                            <span style={{ display: "inline-block", marginTop: 4, fontSize: 11, fontWeight: 600, padding: "2px 8px", borderRadius: 10, background: em.replied ? "#ecfdf5" : "#fffbeb", color: em.replied ? "#10b981" : "#f59e0b" }}>
                              {em.replied ? "↩️ Replied" : "📨 Not Replied"}
                            </span>
                          )}
                          {em.reason && <div style={{ color: c.color, fontSize: 12, marginTop: 4, fontStyle: "italic" }}>💡 {em.reason}</div>}
                        </div>
                        {em.category && (
                          <select value={em.category} onClick={e => e.stopPropagation()} onChange={e => { e.stopPropagation(); }}
                            style={{ fontSize: 12, padding: "3px 6px", borderRadius: 6, border: "1px solid " + c.border, background: c.bg, color: c.color, cursor: "pointer", flexShrink: 0 }}>
                            {Object.entries(CATEGORIES).map(([k, cv]) => <option key={k} value={k}>{cv.label}</option>)}
                          </select>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            </>
          )}

          {!loading && !emails.length && !error && (
            <div style={{ textAlign: "center", padding: 50, color: "#94a3b8" }}>
              <div style={{ fontSize: 48 }}>📭</div>
              <p style={{ marginTop: 10, fontSize: 14 }}>Click a button above to get started!</p>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
